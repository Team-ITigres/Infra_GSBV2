- name: Update 
  hosts: linuxs
  become: yes
  roles: 
    - roles/MAJ  

- name : Install AdGuard
  become: yes
  hosts: Adguard
  roles:
    - roles/Adguard

- name : Install Uptime Kuma
  become: yes
  hosts: Uptime_Kuma
  roles:
    - roles/Install_Docker
    - roles/Uptime_Kuma

- name : Install GLPI
  become: yes
  hosts: GLPI
  roles:
    - roles/Install_Docker
    - roles/GLPI

- name : Install SFTP Server
  become: yes
  hosts: SFTP
  vars:
    sftp_users:
      - username: user1
        password: "Formation13@"
        home_dir: user1
      - username: user2
        password: "Formation13@"
        home_dir: user2
  roles:
    - roles/SFTP

- name : Promouvoir l'AD
  hosts: WinSRV01
  roles:
    - roles/PromouvoirAD01

- name: ReplicationAD02
  hosts: WinSRV02
  roles:
    - roles/ReplicationAD02
